[project]
name = "phpipam-cli"
version = "0.1.0"
description = "A command line tool to interact with PHPIPAM"
requires-python = ">=3.12"
dependencies = [
    "click>=8.1",
    "httpx>=0.28",
]

[project.scripts]
ipam = "ipam.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ipam"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
markers = ["integration: end-to-end tests requiring Docker phpIPAM service"]
addopts = "-m 'not integration' --strict-markers"

[tool.coverage.run]
source = ["ipam"]

[tool.coverage.report]
fail_under = 100
show_missing = true

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=6.0",
    "pytest-httpx>=0.35",
]
